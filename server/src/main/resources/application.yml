spring:
  application:
    name: snk-server
  datasource:
    url: jdbc:postgresql://${SNK_DB_HOST:localhost}:${SNK_DB_PORT:5432}/${SNK_DB_NAME:snk}
    username: ${SNK_DB_USERNAME:snk}
    password: ${SNK_DB_PASSWORD:snk}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SNK_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${SNK_DB_MIN_IDLE:2}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  sql:
    init:
      mode: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    org.flywaydb: info
