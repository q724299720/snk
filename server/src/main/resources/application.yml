server:
  forward-headers-strategy: framework

spring:
  application:
    name: snk-server
  config:
    import:
      - optional:file:${SNK_RUNTIME_CONFIG:./runtime/application-runtime.yml}
      - optional:file:./server/runtime/application-runtime.yml
      - optional:file:../runtime/application-runtime.yml
      - optional:file:../../runtime/application-runtime.yml
  servlet:
    multipart:
      max-file-size: ${SNK_UPLOAD_MAX_FILE_SIZE:10MB}
      max-request-size: ${SNK_UPLOAD_MAX_REQUEST_SIZE:10MB}
  datasource:
    url: jdbc:postgresql://${SNK_DB_HOST:localhost}:${SNK_DB_PORT:5432}/${SNK_DB_NAME:snk}
    username: ${SNK_DB_USERNAME:snk}
    password: ${SNK_DB_PASSWORD:snk}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SNK_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${SNK_DB_MIN_IDLE:2}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  sql:
    init:
      mode: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    org.flywaydb: info

snk:
  storage:
    root-path: ${SNK_STORAGE_ROOT:./runtime/storage}
    public-path: ${SNK_STORAGE_PUBLIC_PATH:/uploads}
    public-base-url: ${SNK_STORAGE_PUBLIC_BASE_URL:https://snk.qiuxinmin.cn}
    image-directory: ${SNK_STORAGE_IMAGE_DIRECTORY:images}
    max-image-size-bytes: ${SNK_STORAGE_MAX_IMAGE_SIZE_BYTES:10485760}
  recognition:
    ocr:
      provider: ${SNK_RECOGNITION_OCR_PROVIDER:disabled}
      stub-text: ${SNK_RECOGNITION_OCR_STUB_TEXT:}
